<!DOCTYPE html>
<html>

<head>

    <title>HR Analytics Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <a href="/dashboard" class="dashboard-btn">
        🏠 Back to Dashboard
    </a>

    <div class="analytics-page">

        <h1>📊 HR Analytics Dashboard</h1>

        <div class="analytics-wrapper">

            <!-- Department Attrition Chart -->

            <div class="chart-box">

                <canvas id="departmentChart"></canvas>

            </div>

            <!-- Performance Distribution Chart -->

            <div class="chart-box">

                <canvas id="performanceChart"></canvas>

            </div>

        </div>

    </div>

<script>

// ================= DEPARTMENT ATTRITION =================

const deptCtx =
document.getElementById(
'departmentChart'
);

new Chart(deptCtx, {

    type: 'bar',

    data: {

        labels: {{ department_labels | tojson }},

        datasets: [{

            label: 'Attrition Count',

            data: {{ department_values | tojson }},

            backgroundColor: [
                '#3B82F6',
                '#EF4444',
                '#10B981',
                '#F59E0B',
                '#8B5CF6',
                '#EC4899',
                '#14B8A6'
            ],

            borderWidth: 1

        }]
    },

    options: {

        responsive: true,

        maintainAspectRatio: false,

        plugins: {

            legend: {
                display: false
            },

            title: {

                display: true,

                text: 'Department Wise Attrition',

                font: {
                    size: 18
                }
            }
        },

        scales: {

            y: {

                beginAtZero: true
            }
        }
    }
});


// ================= PERFORMANCE DISTRIBUTION =================

const perfCtx =
document.getElementById(
'performanceChart'
);

new Chart(perfCtx, {

    type: 'doughnut',

    data: {

        labels: [
            'High Performance',
            'Average Performance',
            'Low Performance'
        ],

        datasets: [{

            data: [
                {{ high_perf }},
                {{ avg_perf }},
                {{ low_perf }}
            ],

            backgroundColor: [
                '#22C55E',
                '#F59E0B',
                '#EF4444'
            ],

            borderWidth: 2

        }]
    },

    options: {

        responsive: true,

        maintainAspectRatio: false,

        cutout: '60%',

        plugins: {

            legend: {

                position: 'top'
            },

            title: {

                display: true,

                text: 'Employee Performance Distribution',

                font: {
                    size: 18
                }
            }
        }
    }
});

</script>

</body>

</html>
