<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>🔍 Detection Result</h1>

        <img src="{{ image_path }}"
             class="result-image">

        <div class="result-box">

            <h2>{{ prediction }}</h2>

            <h3>
                Confidence Score :
                {{ confidence }}%
            </h3>

            <br>

            {% if prediction == "Mask" %}
                <h2 class="safe">
                    ✅ Mask Detected
                </h2>
            {% else %}
                <h2 class="danger">
                    ❌ No Mask Detected
                </h2>
            {% endif %}

        </div>

        <a href="/" class="back-btn">
            Upload Another Image
        </a>

    </div>

</div>

</body>
</html>
