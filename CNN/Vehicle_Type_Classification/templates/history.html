<!DOCTYPE html>
<html>
<head>
<title>Prediction History</title>
<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<div class="card">

<h1>📊 Prediction History</h1>

<table>

<tr>
<th>Image</th>
<th>Prediction</th>
<th>Confidence</th>
</tr>

{% for row in history %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}%</td>
</tr>

{% endfor %}

</table>

</div>

</div>

</body>
</html>
