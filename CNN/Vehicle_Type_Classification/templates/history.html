<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>📊 Prediction History</h1>

        <table>

            <tr>
                <th>Uploaded Image</th>
                <th>Prediction</th>
                <th>Confidence</th>
            </tr>

            {% for row in history %}

            <tr>

                <td>
                    <img src="/{{ row[0] }}"
                         width="120"
                         height="80">
                </td>

                <td>{{ row[1] }}</td>

                <td>{{ row[2] }}%</td>

            </tr>

            {% endfor %}

        </table>

        <br>

        <a href="/" class="history-btn">
            Back to Home
        </a>

    </div>

</div>

</body>
</html>
