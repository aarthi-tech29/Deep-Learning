<!DOCTYPE html>
<html>
<head>
<title>Result</title>

<link rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}">
</head>

<body>

<div class="container">

<div class="card">

<h1>📊 Sentiment Result</h1>

{% if result == "POSITIVE" %}

<div class="positive">
😊 POSITIVE REVIEW
</div>

{% else %}

<div class="negative">
😞 NEGATIVE REVIEW
</div>

{% endif %}

<div class="review-box">
{{ review }}
</div>

<a href="/" class="btn">
Analyze Another Review
</a>

</div>

</div>

</body>
</html>
